name: Code coverage

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  coverage:
    name: Unit-test coverage
    runs-on: ubuntu-24.04
    steps:
      - uses: taiki-e/install-action@6887963ccf37a9ddcd8c5fa4baeb3e1e5fd61fa1  # v2.81.2
        with:
          tool: just
      - uses: actions/checkout@v6
      - name: Run unit tests under coverage
        uses: ./
        with:
          engine: docker
          command: test-unit-coverage
      - name: Stage coverage report and commit SHA
        env:
          EVENT_NAME: ${{ github.event_name }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PUSH_SHA: ${{ github.sha }}
        run: |
          mkdir -p coverage-artifact
          cp chris_backend/coverage.xml coverage-artifact/coverage.xml
          if [ "$EVENT_NAME" = pull_request ]; then
            echo "$PR_HEAD_SHA" > coverage-artifact/commit-sha.txt
          else
            echo "$PUSH_SHA" > coverage-artifact/commit-sha.txt
          fi
      - name: Upload coverage artifact
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: coverage-artifact/
          if-no-files-found: error
          retention-days: 1
