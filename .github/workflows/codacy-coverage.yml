name: Code coverage

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  coverage:
    name: Unit-test coverage
    runs-on: ubuntu-24.04
    env:
      CODACY_PROJECT_TOKEN: ${{ secrets.CODACY_PROJECT_TOKEN }}
    steps:
      - uses: taiki-e/install-action@6887963ccf37a9ddcd8c5fa4baeb3e1e5fd61fa1  # v2.81.2
        with:
          tool: just
      - uses: actions/checkout@v6
      - name: Run unit tests under coverage
        uses: ./
        with:
          engine: docker
          command: test-unit-coverage
      - name: Make coverage paths relative to the repository root
        run: sed -i 's| filename="| filename="chris_backend/|g' chris_backend/coverage.xml
      - name: Upload coverage to Codacy
        if: ${{ env.CODACY_PROJECT_TOKEN != '' }}
        uses: codacy/codacy-coverage-reporter-action@89d6c85cfafaec52c72b6c5e8b2878d33104c699  # v1.3.0
        with:
          project-token: ${{ secrets.CODACY_PROJECT_TOKEN }}
          coverage-reports: chris_backend/coverage.xml
          force-coverage-parser: cobertura
