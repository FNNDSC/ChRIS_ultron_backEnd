# TEMPORARY end-to-end test of the Codacy coverage upload — DELETE before merge.
#
# workflow_run only fires from the default branch, so we can't exercise the real
# two-workflow split from this branch. This collapses build + upload into one
# workflow (two jobs, same run) so the reporter call and the real upload to
# Codacy can be verified from feature/codacy-workflow.
name: TEMP Codacy e2e test

on:
  push:
    branches: [ feature/codacy-workflow ]

permissions:
  contents: read

jobs:
  build:
    name: Build coverage (temp)
    runs-on: ubuntu-24.04
    steps:
      - uses: taiki-e/install-action@6887963ccf37a9ddcd8c5fa4baeb3e1e5fd61fa1  # v2.81.2
        with:
          tool: just
      - uses: actions/checkout@v6
      - name: Run unit tests under coverage
        uses: ./
        with:
          engine: docker
          command: test-unit-coverage
      - name: Stage coverage report and commit SHA
        env:
          PUSH_SHA: ${{ github.sha }}
        run: |
          mkdir -p coverage-artifact
          cp chris_backend/coverage.xml coverage-artifact/coverage.xml
          echo "$PUSH_SHA" > coverage-artifact/commit-sha.txt
      - name: Upload coverage artifact
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: coverage-artifact/
          if-no-files-found: error
          retention-days: 1

  upload:
    name: Upload coverage to Codacy (temp)
    needs: build
    runs-on: ubuntu-24.04
    env:
      CODACY_PROJECT_TOKEN: ${{ secrets.CODACY_PROJECT_TOKEN }}
    steps:
      - name: Download coverage artifact
        uses: actions/download-artifact@v8
        with:
          name: coverage-report
          path: artifact
      - name: Read and validate commit SHA
        id: meta
        run: |
          sha="$(cat artifact/commit-sha.txt)"
          if ! printf '%s' "$sha" | grep -Eq '^[0-9a-f]{40}$'; then
            echo "Invalid commit SHA in artifact: '$sha'" >&2
            exit 1
          fi
          echo "sha=$sha" >> "$GITHUB_OUTPUT"
      - name: Upload coverage to Codacy
        if: ${{ env.CODACY_PROJECT_TOKEN != '' }}
        env:
          COMMIT_SHA: ${{ steps.meta.outputs.sha }}
        run: |
          bash <(curl -Ls https://coverage.codacy.com/get.sh) report \
            --force-coverage-parser cobertura \
            --prefix chris_backend/ \
            -r artifact/coverage.xml \
            --commit-uuid "$COMMIT_SHA"
