# Docker Compose override for Swift object storage mode.
# Layers on top of docker-compose.yml. Do not use directly.
# Usage via justfile: just storage=swift dev

services:
  chris:
    environment:
      STORAGE_ENV: "swift"
    depends_on:
      swift_service:
        condition: service_started

  worker-mains:
    environment:
      STORAGE_ENV: "swift"
    depends_on:
      swift_service:
        condition: service_started

  worker-periodic:
    environment:
      STORAGE_ENV: "swift"
    depends_on:
      swift_service:
        condition: service_started

  celery-scheduler:
    environment:
      STORAGE_ENV: "swift"
    depends_on:
      swift_service:
        condition: service_started

  pfcon:
    environment:
      STORAGE_ENV: "swift"
      SWIFT_AUTH_URL: "http://swift_service:8080/auth/v1.0"
      SWIFT_USERNAME: "chris:chris1234"
      SWIFT_KEY: "testing"
      SWIFT_CONTAINER_NAME: "users"
    depends_on:
      swift_service:
        condition: service_started

  swift_service:
    image: ${SWIFT_IMAGE:-ghcr.io/fnndsc/docker-swift-onlyone}
    init: true
    volumes:
      - swift_storage:/srv
    environment:
      - SWIFT_USERNAME=chris:chris1234
      - SWIFT_KEY=testing
    ports:
      - "8080:8080"
    networks:
      - local

volumes:
  swift_storage:
